name: Build Release Bundle

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (bundle or apk)'
        required: true
        default: 'bundle'
        type: choice
        options:
          - bundle
          - apk
          - both

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          echo "KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV

      - name: Build release bundle
        env:
          CAREXPLORER_UPLOAD_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          CAREXPLORER_UPLOAD_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CAREXPLORER_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CAREXPLORER_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build release APK (optional)
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' }}
        env:
          CAREXPLORER_UPLOAD_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          CAREXPLORER_UPLOAD_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CAREXPLORER_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CAREXPLORER_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload to Play Store Console
        if: ${{ github.event_name == 'push' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: 'com.adateo.carexplorer'
          releaseFiles: 'android/app/build/outputs/bundle/release/app-release.aab'
          track: 'internal'
          status: 'draft'

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: ./RELEASE_NOTES_${{ github.ref_name }}.md
          draft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
