name: Build Release Bundle

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag for artifact naming (e.g. v2.0.8). Leave blank to use a timestamp.'
        required: false
        default: ''
      build_type:
        description: 'Build type'
        required: true
        default: 'bundle'
        type: choice
        options:
          - bundle
          - apk
          - both

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine version tag and artifact name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version_tag }}" ]; then
            TAG="${{ github.event.inputs.version_tag }}"
          else
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "artifact-name=release-bundle-${TAG}" >> $GITHUB_OUTPUT
          echo "Version tag: ${TAG}"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build AAB
        id: build
        uses: ./.github/actions/build-android-aab
        with:
          java-home: ${{ env.JAVA_HOME }}
          android-home: ${{ env.ANDROID_HOME }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          admob-app-id: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}

      - name: Verify AAB Signing
        uses: ./.github/actions/verify-aab-signing
        with:
          aab-path: ${{ steps.build.outputs.aab-path }}
          expected-sha1: 'AC:F5:2A:DD:61:C8:8B:AA:B7:54:74:F9:B2:D5:6E:7E:9F:00:A4:E3'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact-name }}
          path: ${{ steps.build.outputs.aab-path }}
          retention-days: 30
          if-no-files-found: error
