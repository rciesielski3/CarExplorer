<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist car silhouette (side view) -->
  <g stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round">
    <!-- Main body/chassis -->
    <ellipse cx="100" cy="130" rx="70" ry="28"/>

    <!-- Cabin top -->
    <path d="M 70 95 Q 100 80 130 95 L 130 120 Q 100 115 70 120 Z" />

    <!-- Front wheel -->
    <circle cx="60" cy="158" r="14"/>
    <circle cx="60" cy="158" r="10" fill="none"/>

    <!-- Rear wheel -->
    <circle cx="140" cy="158" r="14"/>
    <circle cx="140" cy="158" r="10" fill="none"/>
  </g>
</svg>
